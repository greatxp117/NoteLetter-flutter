name: flutter_app
description: NoteLetter - AI-powered newsletter and knowledge base app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  file_picker: ^8.0.7
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  dio: ^5.9.2
  url_launcher: ^6.3.2
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/landing-hero.png
    - assets/hero-knowledge.png
    - assets/favicon.png
